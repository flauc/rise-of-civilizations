<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Rise of Civilizations</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --panel: rgba(10, 22, 36, 0.92);
        --edge: rgba(255, 255, 255, 0.14);
        --accent: #ffd967;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1622;
        color: #cfe3f7;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        color: #eaf3fb;
        background: #213a52;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 7px 12px;
        cursor: pointer;
        user-select: none;
      }
      .btn:hover {
        background: #2b4d6c;
      }
      .btn.primary {
        background: #2f6f3f;
      }
      .btn.primary:hover {
        background: #3a8a4e;
      }
      .panel {
        position: fixed;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
        user-select: none;
        backdrop-filter: blur(2px);
      }
      .panel b {
        color: #fff;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      /* Top status bar — compact, wraps so it always fits */
      #topbar {
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        max-width: calc(100vw - 12px);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 8px 14px;
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 13px;
      }
      .tb-grp {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tb-turn {
        font-weight: 700;
      }
      .tb-civ {
        max-width: 38vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chip {
        background: #16293c;
        border-radius: 7px;
        padding: 3px 8px;
        white-space: nowrap;
      }
      .tb-pill {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font: inherit;
        color: #eaf3fb;
        background: #213a52;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 5px 10px 7px;
        cursor: pointer;
        max-width: 160px;
        overflow: hidden;
      }
      .tb-pill b {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tb-pill::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        width: var(--p, 0%);
        background: var(--accent);
        border-radius: 0 2px 2px 0;
      }
      .tb-pill.civic::after {
        background: #c07ad0;
      }
      .tb-pl {
        opacity: 0.8;
      }
      /* shared small text + cost chips used in panels/modals */
      .sub {
        color: #9fc0dc;
        font-size: 11.5px;
        line-height: 1.35;
      }
      .cost {
        color: #cfe3f7;
        white-space: nowrap;
        font-size: 12px;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      /* Selected-unit panel */
      #unit-panel {
        left: 12px;
        bottom: 12px;
        min-width: 180px;
      }
      /* City panel */
      #city-panel {
        right: 12px;
        top: 76px;
        width: 264px;
      }
      .ygrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px 10px;
        margin-top: 6px;
        padding: 6px 8px;
        background: #14283b;
        border-radius: 8px;
      }
      #endturn2 {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 64px;
        font-size: 12px;
        padding: 5px 12px;
        opacity: 0.85;
      }
      #city-panel select {
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        border-radius: 8px;
        background: #14283b;
        color: #eaf3fb;
        border: 1px solid var(--edge);
      }
      .bar {
        height: 8px;
        background: #1a2c40;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: var(--accent);
      }
      /* End turn button */
      #endturn {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        font-size: 15px;
        padding: 12px 18px;
      }
      /* Minimap */
      #minimap {
        position: fixed;
        right: 12px;
        bottom: 12px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        background: var(--panel);
        touch-action: none;
        cursor: pointer;
      }
      /* Victory / defeat overlay */
      #gameover {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(5, 12, 20, 0.78);
        z-index: 60;
        text-align: center;
      }
      #gameover .title {
        font-size: 40px;
        font-weight: 800;
      }
      #gameover .sub {
        color: #cfe3f7;
        font-size: 16px;
      }
      /* Research / civics / religion / production modal */
      #research,
      #civics,
      #religion,
      #production {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 320px;
        max-height: 80vh;
        overflow: auto;
      }
      .tech .sub {
        margin-top: 2px;
      }
      .tech .cost {
        margin-left: 8px;
      }
      /* production cards */
      .pcard {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid var(--edge);
        border-radius: 10px;
        margin-top: 7px;
        cursor: pointer;
      }
      .pcard:hover {
        background: #1d344c;
        border-color: #3a5d7c;
      }
      .pglyph {
        flex: none;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        background: #213a52;
        border-radius: 8px;
      }
      .locked-note {
        margin-top: 10px;
        padding: 10px 12px;
        background: #2a2030;
        border: 1px solid #5a4a66;
        border-radius: 8px;
        color: #e6d2b8;
        font-size: 13px;
      }
      /* Full tech tree */
      #techtree {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 94vw;
        height: 88vh;
        max-height: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      #techtree > div:first-child {
        flex: none;
      }
      #techtree .tt-scroll {
        margin-top: 8px;
      }
      #techtree > div:last-child {
        flex: 1;
        overflow: auto;
      }
      .tt-node {
        position: absolute;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 9px;
        border: 2px solid var(--edge);
        background: #16273a;
        overflow: hidden;
      }
      .tt-name {
        font-weight: 700;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tt-cost {
        font-size: 11px;
        color: #9fc0dc;
      }
      .tt-unlocks {
        margin-top: 3px;
        font-size: 10.5px;
        line-height: 1.3;
        color: #b9c9d8;
        max-height: 40px;
        overflow: hidden;
      }
      .tt-done {
        border-color: #4a9a4e;
        background: #16301c;
      }
      .tt-researching {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 217, 103, 0.25);
      }
      .tt-available {
        border-color: #3d7fe0;
        cursor: pointer;
      }
      .tt-available:hover {
        background: #1d3a55;
      }
      .tt-locked {
        opacity: 0.5;
      }
      /* edges */
      .tt-edge {
        stroke: #3a5269;
        opacity: 0.5;
        transition: opacity 0.1s, stroke 0.1s;
      }
      .tt-edge-done {
        stroke: #4a8a4e;
        opacity: 0.75;
      }
      .tt-edge-hl {
        stroke: #ffd967 !important;
        opacity: 1 !important;
        stroke-width: 3 !important;
      }
      .tt-edge-dim {
        opacity: 0.06 !important;
      }
      /* prerequisite-chain highlight */
      .tt-node.tt-hl {
        opacity: 1 !important;
        border-color: #ffd967 !important;
        box-shadow: 0 0 0 2px rgba(255, 217, 103, 0.35);
        z-index: 2;
      }
      .tt-node.tt-dim {
        opacity: 0.16 !important;
      }
      .csub {
        margin-top: 10px;
        margin-bottom: 2px;
        color: #c79ad6;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #civics .row {
        gap: 6px;
      }
      .tech {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        margin-top: 6px;
        cursor: pointer;
      }
      .tech:hover {
        background: #1d344c;
      }
      /* transient banner */
      #banner {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translateX(-50%);
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        background: rgba(8, 16, 26, 0.8);
        padding: 12px 22px;
        border-radius: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #banner.show {
        opacity: 1;
      }
      /* log */
      #log {
        position: fixed;
        left: 12px;
        top: 64px;
        max-width: 320px;
        font-size: 12px;
        color: #9fc0dc;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      .hidden {
        display: none !important;
      }

      /* ---- mobile / narrow screens: panels become bottom sheets ---- */
      @media (max-width: 640px) {
        #topbar {
          font-size: 12px;
          gap: 6px 10px;
          padding: 6px 8px;
        }
        .tb-civ {
          max-width: 32vw;
        }
        .tb-pill {
          max-width: 116px;
        }
        #unit-panel,
        #city-panel {
          left: 6px;
          right: 6px;
          width: auto;
          min-width: 0;
          top: auto;
          bottom: 100px;
          max-height: 46vh;
          overflow: auto;
        }
        #research,
        #civics,
        #religion,
        #production {
          width: calc(100vw - 20px);
        }
        #minimap {
          width: 116px;
        }
        #log {
          max-width: 50vw;
          font-size: 11px;
        }
        .btn {
          padding: 9px 13px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
