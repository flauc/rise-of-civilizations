<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A turn-based 4X strategy game from the Ancient Era to the Age of Exploration."
    />
    <meta name="theme-color" content="#0a1624" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rise of Civ" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Rise of Civilizations</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --panel: rgba(10, 22, 36, 0.92);
        --edge: rgba(255, 255, 255, 0.14);
        --accent: #ffd967;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a1624;
        color: #cfe3f7;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        background: #0a1624;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        color: #eaf3fb;
        background: #213a52;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 7px 12px;
        cursor: pointer;
        user-select: none;
      }
      .btn:hover {
        background: #2b4d6c;
      }
      .btn.primary {
        background: #2f6f3f;
      }
      .btn.primary:hover {
        background: #3a8a4e;
      }
      .panel {
        position: fixed;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
        user-select: none;
        backdrop-filter: blur(2px);
      }
      .panel b {
        color: #fff;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      /* Top status bar — stretches from the left to the leader avatar */
      #topbar {
        top: max(6px, env(safe-area-inset-top));
        left: max(6px, env(safe-area-inset-left));
        right: calc(96px + env(safe-area-inset-right));
        transform: none;
        max-width: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px 14px;
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 13px;
        z-index: 20;
      }
      #leader-avatar {
        position: fixed;
        top: max(6px, env(safe-area-inset-top));
        right: max(6px, env(safe-area-inset-right));
        width: 84px;
        z-index: 21;
        display: flex;
        flex-direction: column;
      }
      #leader-avatar.empty {
        display: none;
      }
      #leader-avatar img {
        width: 84px;
        height: 96px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--edge);
        background: #16293c;
      }
      #leader-avatar .leader-avatar-label {
        margin-top: 4px;
        text-align: center;
        font-size: 10px;
        color: #cfe3f7;
        line-height: 1.2;
      }
      #leader-avatar .leader-avatar-label span {
        display: block;
        color: #9fc0dc;
      }
      .tb-grp {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tb-turn {
        font-weight: 700;
      }
      .tb-civ {
        max-width: 38vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chip {
        background: #16293c;
        border-radius: 7px;
        padding: 3px 8px;
        white-space: nowrap;
      }
      .tb-pill {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font: inherit;
        color: #eaf3fb;
        background: #213a52;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 5px 10px 7px;
        cursor: pointer;
        max-width: 160px;
        overflow: hidden;
      }
      .tb-pill b {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tb-pill::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        width: var(--p, 0%);
        background: var(--accent);
        border-radius: 0 2px 2px 0;
      }
      .tb-pill.civic::after {
        background: #c07ad0;
      }
      .tb-pl {
        opacity: 0.8;
      }
      .tb-score {
        margin-left: 4px;
        font-size: 11px;
        color: #9fc0dc;
        font-weight: 600;
      }
      .tb-div {
        opacity: 0.5;
        margin: 0 2px;
      }
      .tb-pill.empire {
        background: #1b3248;
        gap: 4px;
      }
      /* shared small text + cost chips used in panels/modals */
      .sub {
        color: #9fc0dc;
        font-size: 11.5px;
        line-height: 1.35;
      }
      .cost {
        color: #cfe3f7;
        white-space: nowrap;
        font-size: 12px;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      /* Selected-unit panel */
      #unit-panel {
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        min-width: 180px;
        z-index: 10;
      }
      /* Selected-tile panel (shares the bottom-left slot with the unit panel) */
      #tile-panel {
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        width: 240px;
        z-index: 10;
      }
      .tinfo-yields {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        margin-top: 6px;
        padding: 6px 8px;
        background: #14283b;
        border-radius: 8px;
      }
      .tinfo-list {
        margin: 8px 0 0;
        padding: 0;
        list-style: none;
        font-size: 12px;
        line-height: 1.5;
      }
      .tinfo-list li {
        display: flex;
        gap: 6px;
        align-items: baseline;
      }
      .tinfo-good {
        color: #7ad08a;
      }
      .tinfo-bad {
        color: #e0907d;
      }
      .tinfo-neutral {
        color: #9fc0dc;
      }
      #tile-panel .tinfo-toggle {
        margin-top: 8px;
        width: 100%;
      }
      /* Hover tooltip — limited tile info, docked in the bottom-right corner
         so it never covers the map under the cursor */
      #tile-tip {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 30;
        pointer-events: none;
        background: rgba(8, 16, 26, 0.92);
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 6px 11px;
        font-size: 13px;
        line-height: 1.35;
        white-space: nowrap;
        text-shadow: 0 1px 2px #000;
      }
      #tile-tip b {
        color: #fff;
      }
      #tile-tip .tt-rough {
        color: #e0b07d;
      }
      #tile-tip .tt-open {
        color: #9fc0dc;
      }
      /* City panel */
      #city-panel {
        right: max(12px, env(safe-area-inset-right));
        top: calc(132px + env(safe-area-inset-top));
        width: 264px;
        z-index: 10;
      }
      .ygrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px 10px;
        margin-top: 6px;
        padding: 6px 8px;
        background: #14283b;
        border-radius: 8px;
      }
      #endturn2 {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(64px + env(safe-area-inset-bottom));
        z-index: 25;
      }
      .action-btn {
        width: 56px;
        height: 56px;
        border: none;
        border-radius: 50%;
        background-color: transparent;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        cursor: pointer;
        padding: 0;
        filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.45));
        transition: filter 0.08s ease, transform 0.08s ease;
      }
      .action-btn:hover {
        filter: drop-shadow(0 5px 7px rgba(0, 0, 0, 0.55));
        transform: translateY(-1px);
      }
      .action-btn:active {
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55));
        transform: translateY(1px);
      }
      .action-next {
        background-image: url("/ui/btn_next_move.png");
      }
      .action-skip {
        background-image: url("/ui/btn_skip_move.png");
      }
      #city-panel select {
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        border-radius: 8px;
        background: #14283b;
        color: #eaf3fb;
        border: 1px solid var(--edge);
      }
      .bar {
        height: 8px;
        background: #1a2c40;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: var(--accent);
      }
      /* End turn / next move buttons */
      #endturn {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 25;
      }
      /* Victory / defeat overlay */
      #gameover {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(5, 12, 20, 0.78);
        z-index: 60;
        text-align: center;
      }
      #gameover .title {
        font-size: 40px;
        font-weight: 800;
      }
      #gameover .sub {
        color: #cfe3f7;
        font-size: 16px;
      }
      /* Research / civics / religion / production / save modal */
      #research,
      #civics,
      #religion,
      #production,
      #save-modal {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 320px;
        max-height: 80vh;
        overflow: auto;
        z-index: 40;
      }
      #save-modal input.lobby-in {
        font: inherit;
        font-size: 13px;
        color: #eaf3fb;
        background: #14283b;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 7px 10px;
        user-select: text;
        -webkit-user-select: text;
      }
      .tech .sub {
        margin-top: 2px;
      }
      .tech .cost {
        margin-left: 8px;
      }
      /* production cards */
      .pcard {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid var(--edge);
        border-radius: 10px;
        margin-top: 7px;
        cursor: pointer;
      }
      .pcard:hover {
        background: #1d344c;
        border-color: #3a5d7c;
      }
      .pglyph {
        flex: none;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        background: #213a52;
        border-radius: 8px;
      }
      .locked-note {
        margin-top: 10px;
        padding: 10px 12px;
        background: #2a2030;
        border: 1px solid #5a4a66;
        border-radius: 8px;
        color: #e6d2b8;
        font-size: 13px;
      }
      /* Full tech tree */
      #techtree {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 94vw;
        height: 88vh;
        max-height: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 41;
      }
      #techtree > div:first-child {
        flex: none;
      }
      #techtree .tt-scroll {
        margin-top: 8px;
      }
      #techtree > div:last-child {
        flex: 1;
        overflow: auto;
      }
      .tt-node {
        position: absolute;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 9px;
        border: 2px solid var(--edge);
        background: #16273a;
        overflow: hidden;
      }
      .tt-name {
        font-weight: 700;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tt-cost {
        font-size: 11px;
        color: #9fc0dc;
      }
      .tt-unlocks {
        margin-top: 3px;
        font-size: 10.5px;
        line-height: 1.3;
        color: #b9c9d8;
        max-height: 40px;
        overflow: hidden;
      }
      .tt-done {
        border-color: #4a9a4e;
        background: #16301c;
      }
      .tt-researching {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(255, 217, 103, 0.25);
      }
      .tt-available {
        border-color: #3d7fe0;
        cursor: pointer;
      }
      .tt-available:hover {
        background: #1d3a55;
      }
      .tt-locked {
        opacity: 0.5;
      }
      /* edges */
      .tt-edge {
        stroke: #3a5269;
        opacity: 0.5;
        transition: opacity 0.1s, stroke 0.1s;
      }
      .tt-edge-done {
        stroke: #4a8a4e;
        opacity: 0.75;
      }
      .tt-edge-hl {
        stroke: #ffd967 !important;
        opacity: 1 !important;
        stroke-width: 3 !important;
      }
      .tt-edge-dim {
        opacity: 0.06 !important;
      }
      /* prerequisite-chain highlight */
      .tt-node.tt-hl {
        opacity: 1 !important;
        border-color: #ffd967 !important;
        box-shadow: 0 0 0 2px rgba(255, 217, 103, 0.35);
        z-index: 2;
      }
      .tt-node.tt-dim {
        opacity: 0.16 !important;
      }
      .csub {
        margin-top: 10px;
        margin-bottom: 2px;
        color: #c79ad6;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #civics .row {
        gap: 6px;
      }
      .tech {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        margin-top: 6px;
        cursor: pointer;
      }
      .tech:hover {
        background: #1d344c;
      }
      /* transient banner */
      #banner {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translateX(-50%);
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        background: rgba(8, 16, 26, 0.8);
        padding: 12px 22px;
        border-radius: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #banner.show {
        opacity: 1;
      }
      /* village reward dialog */
      #village-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 60;
      }
      #village-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #village-dialog {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        width: min(380px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 14px;
        padding: 18px 20px;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 61;
      }
      #village-dialog.show {
        opacity: 1;
        pointer-events: auto;
      }
      #village-dialog .village-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 10px;
      }
      #village-dialog .village-msg {
        font-size: 15px;
        line-height: 1.5;
        color: #cfe3f7;
        margin-bottom: 18px;
      }
      #village-dialog .btn {
        padding: 8px 20px;
      }
      /* log — hidden on the HUD; shown via the Game Log dialog */
      #log {
        display: none;
      }
      #log-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 60;
      }
      #log-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #log-dialog {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(520px, calc(100vw - 32px));
        max-height: 80vh;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 14px;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 61;
      }
      #log-dialog.show {
        opacity: 1;
        pointer-events: auto;
      }
      .log-dialog-title {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
      }
      #log-dialog-content {
        flex: 1;
        overflow: auto;
        font-size: 13px;
        line-height: 1.5;
        color: #cfe3f7;
      }
      #log-dialog-content div {
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      #log-dialog-content div:last-child {
        border-bottom: none;
      }
      #log-dialog .btn {
        margin-top: 14px;
        align-self: center;
      }
      .hidden {
        display: none !important;
      }

      #bottom-bar {
        display: none;
      }

      /* ---- mobile / narrow screens: panels become bottom sheets ---- */
      @media (max-width: 640px) {
        #topbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          padding: 6px 10px;
          top: max(6px, env(safe-area-inset-top));
          left: calc(54px + env(safe-area-inset-left));
          right: max(6px, env(safe-area-inset-right));
          font-size: 13px;
        }
        #topbar .tb-grp:nth-child(2),
        #topbar .tb-grp:nth-child(3) {
          display: none;
        }
        .tb-civ {
          max-width: 58vw;
        }
        #leader-avatar {
          display: flex;
          position: fixed;
          top: max(6px, env(safe-area-inset-top));
          left: max(6px, env(safe-area-inset-left));
          right: auto;
          width: 44px;
          z-index: 25;
        }
        #leader-avatar img {
          width: 44px;
          height: 52px;
          border-radius: 8px;
        }
        #bottom-bar {
          position: fixed;
          display: flex;
          align-items: center;
          gap: 4px;
          bottom: max(6px, env(safe-area-inset-bottom));
          right: max(6px, env(safe-area-inset-right));
          left: auto;
          top: auto;
          padding: 4px 6px;
          border-radius: 10px;
          z-index: 25;
          transform: none;
        }
        .bb-grp {
          display: flex;
          gap: 4px;
        }
        .bb-chip,
        .bb-btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 3px;
          min-width: 28px;
          height: 32px;
          padding: 0 4px;
          border-radius: 8px;
          background: #213a52;
          border: 1px solid var(--edge);
          color: #eaf3fb;
          font: inherit;
          font-size: 10px;
          line-height: 1;
          cursor: pointer;
          user-select: none;
          position: relative;
          overflow: hidden;
        }
        .bb-chip {
          cursor: default;
          background: #16293c;
        }
        .bb-btn::after {
          content: "";
          position: absolute;
          left: 0;
          bottom: 0;
          height: 2px;
          width: var(--p, 0%);
          background: var(--accent);
        }
        .bb-btn[data-bb="civics"]::after {
          background: #c07ad0;
        }
        .bb-btn i {
          font-style: normal;
          color: #9fc0dc;
          font-size: 10px;
        }
        #unit-panel,
        #tile-panel {
          left: max(6px, env(safe-area-inset-left));
          right: max(6px, env(safe-area-inset-right));
          width: auto;
          min-width: 0;
          top: auto;
          bottom: calc(74px + env(safe-area-inset-bottom));
          max-height: min(46vh, 320px);
          overflow: auto;
          z-index: 10;
        }
        #city-panel {
          left: max(6px, env(safe-area-inset-left));
          right: max(6px, env(safe-area-inset-right));
          width: auto;
          min-width: 0;
          top: auto;
          bottom: calc(74px + env(safe-area-inset-bottom));
          max-height: none;
          overflow: visible;
          z-index: 10;
        }
        #endturn {
          left: max(6px, env(safe-area-inset-left));
          right: auto;
          bottom: max(6px, env(safe-area-inset-bottom));
          transform: none;
        }
        #endturn2 {
          left: calc(64px + env(safe-area-inset-left));
          right: auto;
          bottom: max(6px, env(safe-area-inset-bottom));
          transform: none;
        }
        .action-btn {
          width: 48px;
          height: 48px;
        }
        #research,
        #civics,
        #religion,
        #production,
        #save-modal {
          width: calc(100vw - 20px);
          max-width: calc(100vw - 20px);
        }
        #save-modal {
          padding: 12px;
        }
        #save-modal .btn {
          width: 100%;
        }
        #log {
          top: calc(56px + env(safe-area-inset-top));
          left: max(6px, env(safe-area-inset-left));
          max-width: 60vw;
          font-size: 11px;
        }
        #tile-tip {
          display: none;
