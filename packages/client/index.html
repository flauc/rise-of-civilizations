<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="A turn-based 4X strategy game from the Ancient Era to the Age of Exploration."
    />
    <meta name="theme-color" content="#0f0e0b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rise of Civ" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>Rise of Civilizations</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Lato', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --bg: #0f0e0b;
        --bg-elevated: #181610;
        --bg-card: #1f1c14;
        --panel: rgba(31, 28, 20, 0.94);
        --edge: rgba(201, 162, 39, 0.28);
        --accent: #c9a227;
        --accent-bright: #f0d878;
        --parchment: #e8dcc5;
        --parchment-dim: #b8aa8d;
        --danger: #8a2c2c;
        --success: #4a6e46;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--parchment);
      }
      h1, h2, h3, h4 {
        font-family: 'Cinzel', Georgia, serif;
        font-weight: 600;
        margin: 0 0 0.4em;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        background: var(--bg);
      }
      .btn {
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--parchment);
        background: transparent;
        border: 1px solid var(--edge);
        border-radius: 999px;
        padding: 8px 16px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .btn:hover {
        background: rgba(201, 162, 39, 0.12);
        border-color: var(--accent);
        color: var(--accent-bright);
      }
      .btn.primary {
        background: linear-gradient(135deg, var(--accent), #a6821f);
        border-color: transparent;
        color: #15120c;
      }
      .btn.primary:hover {
        background: linear-gradient(135deg, var(--accent-bright), var(--accent));
        color: #0f0e0b;
        box-shadow: 0 8px 24px rgba(201, 162, 39, 0.25);
      }
      .panel {
        position: fixed;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
        user-select: none;
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
      }
      .panel b {
        color: var(--parchment);
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      /* Top status bar — stretches from the left to the leader avatar */
      #topbar {
        top: max(6px, env(safe-area-inset-top));
        left: max(6px, env(safe-area-inset-left));
        right: calc(96px + env(safe-area-inset-right));
        transform: none;
        max-width: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px 14px;
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 13px;
        z-index: 20;
      }
      #leader-avatar {
        position: fixed;
        top: max(6px, env(safe-area-inset-top));
        right: max(6px, env(safe-area-inset-right));
        width: 84px;
        z-index: 21;
        display: flex;
        flex-direction: column;
      }
      #leader-avatar.empty {
        display: none;
      }
      #leader-avatar img {
        width: 84px;
        height: 96px;
        object-fit: cover;
        border-radius: 12px;
        border: 1px solid var(--edge);
        background: var(--bg-card);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      #leader-avatar .leader-avatar-label {
        margin-top: 4px;
        text-align: center;
        font-size: 10px;
        color: var(--parchment);
        line-height: 1.2;
      }
      #leader-avatar .leader-avatar-label span {
        display: block;
        color: var(--parchment-dim);
      }
      .tb-grp {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tb-turn {
        font-weight: 700;
        color: var(--accent-bright);
      }
      .tb-civ {
        max-width: 38vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tb-pill {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font: inherit;
        color: var(--parchment);
        background: rgba(201, 162, 39, 0.08);
        border: 1px solid var(--edge);
        border-radius: 999px;
        padding: 5px 10px 7px;
        cursor: pointer;
        max-width: 160px;
        overflow: hidden;
      }
      .tb-pill b {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tb-pill::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        height: 3px;
        width: var(--p, 0%);
        background: var(--accent);
        border-radius: 0 2px 2px 0;
      }
      .tb-pill.civic::after {
        background: #c07ad0;
      }
      .tb-pl {
        opacity: 0.8;
      }
      .tb-score {
        margin-left: 4px;
        font-size: 11px;
        color: var(--parchment-dim);
        font-weight: 600;
      }
      .tb-div {
        opacity: 0.5;
        margin: 0 2px;
      }
      .tb-pill.empire {
        background: rgba(201, 162, 39, 0.12);
        gap: 4px;
      }
      /* shared small text + cost chips used in panels/modals */
      .sub {
        color: var(--parchment-dim);
        font-size: 11.5px;
        line-height: 1.35;
      }
      .cost {
        color: var(--parchment);
        white-space: nowrap;
        font-size: 12px;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      /* Selected-unit panel */
      #unit-panel {
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        min-width: 180px;
        max-height: min(70vh, 520px);
        overflow: auto;
        z-index: 10;
      }
      /* Selected-tile panel (shares the bottom-left slot with the unit panel) */
      #tile-panel {
        left: max(12px, env(safe-area-inset-left));
        bottom: max(12px, env(safe-area-inset-bottom));
        width: 240px;
        z-index: 10;
      }
      .tinfo-yields {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        margin-top: 6px;
        padding: 6px 8px;
        background: rgba(201, 162, 39, 0.08);
        border-radius: 8px;
      }
      .tinfo-list {
        margin: 8px 0 0;
        padding: 0;
        list-style: none;
        font-size: 12px;
        line-height: 1.5;
      }
      .tinfo-list li {
        display: flex;
        gap: 6px;
        align-items: baseline;
      }
      .tinfo-good {
        color: #a3d9a8;
      }
      .tinfo-bad {
        color: #e0a69a;
      }
      .tinfo-neutral {
        color: var(--parchment-dim);
      }
      #tile-panel .tinfo-toggle {
        margin-top: 8px;
        width: 100%;
      }
      /* Hover tooltip — limited tile info, docked in the bottom-right corner
         so it never covers the map under the cursor */
      #tile-tip {
        position: fixed;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 30;
        pointer-events: none;
        background: rgba(8, 16, 26, 0.92);
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 6px 11px;
        font-size: 13px;
        line-height: 1.35;
        white-space: nowrap;
        text-shadow: 0 1px 2px #000;
      }
      #tile-tip b {
        color: #fff;
      }
      #tile-tip .tt-rough {
        color: #e0b07d;
      }
      #tile-tip .tt-open {
        color: var(--parchment-dim);
      }
      /* City panel */
      #city-panel {
        right: max(12px, env(safe-area-inset-right));
        top: calc(132px + env(safe-area-inset-top));
        width: 264px;
        z-index: 10;
      }
      .ygrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px 10px;
        margin-top: 6px;
        padding: 6px 8px;
        background: rgba(201, 162, 39, 0.08);
        border-radius: 8px;
      }
      #endturn2 {
        position: fixed;
        left: calc(50% + 10px);
        transform: none;
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 25;
        width: 34px;
        height: 34px;
      }
      .action-btn {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        background-color: transparent;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        cursor: pointer;
        padding: 0;
        transition: filter 0.08s ease, transform 0.08s ease;
      }
      .action-btn:hover {
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.28)) drop-shadow(0 3px 5px rgba(0, 0, 0, 0.4));
        transform: translateY(-1px);
      }
      .action-btn:active {
        filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.15)) drop-shadow(0 1px 2px rgba(0, 0, 0, 0.35));
        transform: translateY(1px);
      }
      .action-next {
        background-image: url("/ui/btn_next_move.png");
      }
      .action-skip {
        background-image: url("/ui/btn_skip_move.png");
      }
      #city-panel select {
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        border-radius: 8px;
        background: var(--bg-card);
        color: var(--parchment);
        border: 1px solid var(--edge);
      }
      .bar {
        height: 8px;
        background: rgba(201, 162, 39, 0.15);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: var(--accent);
      }
      /* End turn / next move buttons */
      #endturn {
        position: fixed;
        left: calc(50% - 44px);
        transform: none;
        bottom: max(12px, env(safe-area-inset-bottom));
        z-index: 25;
      }
      /* Victory / defeat overlay */
      #gameover {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(15, 14, 11, 0.88);
        z-index: 60;
        text-align: center;
      }
      #gameover .title {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 40px;
        font-weight: 800;
        color: var(--accent-bright);
      }
      #gameover .sub {
        color: var(--parchment);
        font-size: 16px;
      }
      /* Research / civics / religion / production / save modal */
      #research,
      #civics,
      #religion,
      #production,
      #save-modal {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 320px;
        max-height: 80vh;
        overflow: auto;
        z-index: 40;
      }
      #save-modal input.lobby-in {
        font: inherit;
        font-size: 13px;
        color: var(--parchment);
        background: var(--bg-card);
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 7px 10px;
        user-select: text;
        -webkit-user-select: text;
      }
      .tech .sub {
        margin-top: 2px;
      }
      .tech .cost {
        margin-left: 8px;
      }
      #production {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .production-header {
        flex: none;
      }
      .production-list {
        flex: 1;
        overflow: auto;
        margin-top: 8px;
        padding-right: 2px;
      }
      /* production cards */
      .pcard {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border: 1px solid var(--edge);
        border-radius: 10px;
        margin-top: 7px;
        cursor: pointer;
      }
      .pcard:hover {
        background: rgba(201, 162, 39, 0.1);
        border-color: var(--accent);
      }
      .pglyph {
        flex: none;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        background: rgba(201, 162, 39, 0.12);
        border-radius: 8px;
      }
      .locked-note {
        margin-top: 10px;
        padding: 10px 12px;
        background: rgba(138, 44, 44, 0.12);
        border: 1px solid rgba(138, 44, 44, 0.4);
        border-radius: 8px;
        color: #e6d2b8;
        font-size: 13px;
      }
      /* Full tech tree */
      #techtree {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 94vw;
        height: 88vh;
        max-height: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 41;
      }
      #techtree > div:first-child {
        flex: none;
      }
      #techtree .tt-scroll {
        margin-top: 8px;
      }
      #techtree > div:last-child {
        flex: 1;
        overflow: auto;
      }
      .tt-node {
        position: absolute;
        box-sizing: border-box;
        padding: 7px 9px;
        border-radius: 12px;
        border: 2px solid var(--edge);
        background: var(--bg-card);
        overflow: hidden;
      }
      .tt-name {
        font-family: 'Cinzel', Georgia, serif;
        font-weight: 600;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tt-cost {
        font-size: 11px;
        color: var(--parchment-dim);
      }
      .tt-unlocks {
        margin-top: 3px;
        font-size: 10.5px;
        line-height: 1.3;
        color: var(--parchment-dim);
        max-height: 40px;
        overflow: hidden;
      }
      .tt-done {
        border-color: #4a9a4e;
        background: rgba(74, 158, 78, 0.12);
      }
      .tt-researching {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(201, 162, 39, 0.25);
      }
      .tt-available {
        border-color: var(--accent);
        cursor: pointer;
      }
      .tt-available:hover {
        background: rgba(201, 162, 39, 0.1);
      }
      .tt-queued {
        border-color: var(--accent);
        border-style: dashed;
        cursor: pointer;
      }
      .tt-queued:hover {
        background: rgba(201, 162, 39, 0.08);
      }
      .tt-locked {
        opacity: 0.5;
      }
      /* edges */
      .tt-edge {
        stroke: #3a5269;
        opacity: 0.5;
        transition: opacity 0.1s, stroke 0.1s;
      }
      .tt-edge-done {
        stroke: #4a8a4e;
        opacity: 0.75;
      }
      .tt-edge-hl {
        stroke: #ffd967 !important;
        opacity: 1 !important;
        stroke-width: 3 !important;
      }
      .tt-edge-dim {
        opacity: 0.06 !important;
      }
      /* prerequisite-chain highlight */
      .tt-node.tt-hl {
        opacity: 1 !important;
        border-color: #ffd967 !important;
        box-shadow: 0 0 0 2px rgba(255, 217, 103, 0.35);
        z-index: 2;
      }
      .tt-node.tt-dim {
        opacity: 0.16 !important;
      }
      .csub {
        margin-top: 10px;
        margin-bottom: 2px;
        color: var(--accent-bright);
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #civics .row {
        gap: 6px;
      }
      .tech {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        margin-top: 6px;
        cursor: pointer;
      }
      .tech:hover {
        background: rgba(201, 162, 39, 0.1);
      }
      /* transient banner */
      #banner {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translateX(-50%);
        font-family: 'Cinzel', Georgia, serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--parchment);
        background: rgba(31, 28, 20, 0.92);
        border: 1px solid var(--edge);
        padding: 12px 22px;
        border-radius: 16px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #banner.show {
        opacity: 1;
      }
      /* village reward dialog */
      #village-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 14, 11, 0.72);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 60;
      }
      #village-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #village-dialog {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        width: min(380px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 16px;
        padding: 18px 20px;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 61;
      }
      #village-dialog.show {
        opacity: 1;
        pointer-events: auto;
      }
      #village-dialog .village-art {
        width: 160px;
        height: 160px;
        object-fit: contain;
        margin: 0 auto 10px;
        display: block;
        border-radius: 12px;
      }
      #village-dialog .village-title {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--accent-bright);
        margin-bottom: 10px;
      }
      #village-dialog .village-msg {
        font-size: 15px;
        line-height: 1.5;
        color: var(--parchment);
        margin-bottom: 18px;
      }
      #village-dialog .btn {
        padding: 8px 20px;
      }
      /* log — hidden on the HUD; shown via the Game Log dialog */
      #log {
        display: none;
      }
      #log-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 14, 11, 0.72);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 60;
      }
      #log-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #log-dialog {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(520px, calc(100vw - 32px));
        max-height: 80vh;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 16px;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 61;
      }
      #log-dialog.show {
        opacity: 1;
        pointer-events: auto;
      }
      .log-dialog-title {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--parchment);
        margin-bottom: 12px;
      }
      #log-dialog-content {
        flex: 1;
        overflow: auto;
        font-size: 13px;
        line-height: 1.5;
        color: var(--parchment);
      }
      #log-dialog-content div {
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      #log-dialog-content div:last-child {
        border-bottom: none;
      }
      #log-dialog .btn {
        margin-top: 14px;
        align-self: center;
      }
      /* gold ledger dialog */
      #gold-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 14, 11, 0.72);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 60;
      }
      #gold-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      #gold-dialog {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(520px, calc(100vw - 32px));
        max-height: 80vh;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 16px;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 61;
      }
      #gold-dialog.show {
        opacity: 1;
        pointer-events: auto;
      }
      .gold-dialog-title {
        font-family: 'Cinzel', Georgia, serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--parchment);
        margin-bottom: 12px;
      }
      #gold-dialog-content {
        flex: 1;
        overflow: auto;
        font-size: 13px;
        line-height: 1.5;
        color: var(--parchment);
      }
      .gold-section {
