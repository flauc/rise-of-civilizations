<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Rise of Civilizations</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        --panel: rgba(10, 22, 36, 0.92);
        --edge: rgba(255, 255, 255, 0.14);
        --accent: #ffd967;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b1622;
        color: #cfe3f7;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        color: #eaf3fb;
        background: #213a52;
        border: 1px solid var(--edge);
        border-radius: 8px;
        padding: 7px 12px;
        cursor: pointer;
        user-select: none;
      }
      .btn:hover {
        background: #2b4d6c;
      }
      .btn.primary {
        background: #2f6f3f;
      }
      .btn.primary:hover {
        background: #3a8a4e;
      }
      .panel {
        position: fixed;
        background: var(--panel);
        border: 1px solid var(--edge);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
        user-select: none;
        backdrop-filter: blur(2px);
      }
      .panel b {
        color: #fff;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      /* Top status bar */
      #topbar {
        top: env(safe-area-inset-top, 0);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0;
        align-items: center;
        padding: 8px 6px;
        border-radius: 0 0 14px 14px;
        border-top: none;
        font-size: 13px;
      }
      #topbar > span {
        display: inline-block;
        line-height: 1.3;
        padding: 0 14px;
        white-space: nowrap;
      }
      #topbar > span + span,
      #topbar > button {
        border-left: 1px solid var(--edge);
      }
      #topbar > button {
        margin-left: 12px;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 6px;
        vertical-align: middle;
      }
      /* Selected-unit panel */
      #unit-panel {
        left: 12px;
        bottom: 12px;
        min-width: 180px;
      }
      /* City panel */
      #city-panel {
        right: 12px;
        top: 76px;
        width: 264px;
      }
      .ygrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px 10px;
        margin-top: 6px;
        padding: 6px 8px;
        background: #14283b;
        border-radius: 8px;
      }
      #endturn2 {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 64px;
        font-size: 12px;
        padding: 5px 12px;
        opacity: 0.85;
      }
      #city-panel select {
        width: 100%;
        margin-top: 4px;
        padding: 6px;
        border-radius: 8px;
        background: #14283b;
        color: #eaf3fb;
        border: 1px solid var(--edge);
      }
      .bar {
        height: 8px;
        background: #1a2c40;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 4px;
      }
      .bar > i {
        display: block;
        height: 100%;
        background: var(--accent);
      }
      /* End turn button */
      #endturn {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 12px;
        font-size: 15px;
        padding: 12px 18px;
      }
      /* Minimap */
      #minimap {
        position: fixed;
        right: 12px;
        bottom: 12px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        background: var(--panel);
        touch-action: none;
        cursor: pointer;
      }
      /* Victory / defeat overlay */
      #gameover {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(5, 12, 20, 0.78);
        z-index: 60;
        text-align: center;
      }
      #gameover .title {
        font-size: 40px;
        font-weight: 800;
      }
      #gameover .sub {
        color: #cfe3f7;
        font-size: 16px;
      }
      /* Research modal */
      #research {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 280px;
        max-height: 70vh;
        overflow: auto;
      }
      #research .tech {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--edge);
        border-radius: 8px;
        margin-top: 6px;
        cursor: pointer;
      }
      #research .tech:hover {
        background: #1d344c;
      }
      /* transient banner */
      #banner {
        position: fixed;
        left: 50%;
        top: 38%;
        transform: translateX(-50%);
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        background: rgba(8, 16, 26, 0.8);
        padding: 12px 22px;
        border-radius: 12px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s;
      }
      #banner.show {
        opacity: 1;
      }
      /* log */
      #log {
        position: fixed;
        left: 12px;
        top: 64px;
        max-width: 320px;
        font-size: 12px;
        color: #9fc0dc;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
